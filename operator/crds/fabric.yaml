apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fabrics.fabric.agnext.io
spec:
  group: fabric.agnext.io
  scope: Namespaced
  names:
    plural: fabrics
    singular: fabric
    kind: Fabric
    shortNames:
      - fab
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - owner
                - mode
              properties:
                owner:
                  type: string
                mode:
                  type: string
                  enum:
                    - development
                    - production
                policyEngine:
                  type: string
                  default: opa
                accessEngine:
                  type: string
                  default: openfga
            status:
              type: object
              properties:
                phase:
                  type: string
                reconciledAt:
                  type: string
                  format: date-time
      subresources:
        status: {}
